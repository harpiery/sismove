<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SismoVe - Mapa Interactivo de Ayuda</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #1e293b; color: #f1f5f9; overflow: hidden; }

        #map { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 1; }

        /* --- BOTÓN DE IDIOMA --- */
        #lang-toggle {
            position: absolute; top: 15px; right: 15px; z-index: 2000;
            background: rgba(30, 41, 59, 0.9); color: white; border: 1px solid #475569;
            padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer;
            font-size: 1rem; transition: background 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #lang-toggle:hover { background: #475569; }

        #sidebar {
            position: absolute; top: 10px; left: 10px; bottom: 10px;
            width: 320px; 
            background-color: rgba(30, 41, 59, 0.95);
            border-radius: 12px;
            display: flex; flex-direction: column; z-index: 1000;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        .sidebar-header {
            padding: 20px; background-color: #0f172a;
            border-bottom: 2px solid #ef4444;
        }
        .sidebar-header h1 { font-size: 1.5rem; display: flex; align-items: center; gap: 10px; }
        .filters { padding: 15px; display: flex; flex-wrap: wrap; gap: 8px; border-bottom: 1px solid #475569; }
        .filter-btn {
            padding: 6px 12px; border: none; border-radius: 20px; cursor: pointer;
            font-size: 0.85rem; font-weight: bold; transition: opacity 0.2s;
        }
        .filter-btn:hover { opacity: 0.8; }
        .filter-btn.active { box-shadow: 0 0 0 2px white; }
        .bg-critical { background-color: #ef4444; color: white; }
        .bg-danger { background-color: #f97316; color: white; }
        .bg-help { background-color: #22c55e; color: white; }
        .bg-info { background-color: #3b82f6; color: white; }
        .bg-solved { background-color: #64748b; color: white; }

        .reports-list { flex: 1; overflow-y: auto; padding: 10px; }
        .report-item {
            background-color: #475569; margin-bottom: 8px; padding: 12px;
            border-radius: 8px; cursor: pointer; border-left: 5px solid gray;
            transition: all 0.3s ease;
        }
        .report-item:hover { background-color: #64748b; }
        .report-item.solved-item { opacity: 0.5; text-decoration: line-through; border-left-color: #9ca3af !important; }
        .report-title { font-weight: bold; font-size: 0.95rem; margin-bottom: 4px; }
        .report-meta { font-size: 0.8rem; opacity: 0.8; display: flex; justify-content: space-between; }

        #legend {
            position: absolute; bottom: 30px; right: 30px; z-index: 1000;
            background: rgba(30, 41, 59, 0.9); padding: 15px; border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .legend-item { display: flex; align-items: center; margin-bottom: 6px; font-size: 0.85rem; }
        .legend-color { width: 14px; height: 14px; border-radius: 50%; margin-right: 10px; display: flex; align-items: center; justify-content: center; color: white; font-size: 8px;}

        #context-menu {
            position: absolute; z-index: 2000; background: #334155;
            border-radius: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            padding: 8px 0; display: none; min-width: 240px;
        }
        .ctx-item { padding: 12px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 0.95rem; }
        .ctx-item:hover { background-color: #475569; }

        #modal-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 3000; display: none;
            justify-content: center; align-items: center;
        }
        #modal {
            background: #334155; padding: 30px; border-radius: 12px;
            width: 400px; max-width: 90%; box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 0.9rem; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #475569;
            background: #1e293b; color: white; font-family: inherit;
        }
        .btn-submit { background: #ef4444; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        .btn-submit:hover { background: #dc2626; }
        .danger-level { display: flex; gap: 5px; }
        .level-btn { flex: 1; padding: 10px; border: none; text-align: center; cursor: pointer; font-weight: bold; border-radius: 4px; color: white; transition: transform 0.1s;}

        .btn-solved { background: #22c55e; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; font-size: 0.9rem; }
        .btn-solved:hover { background: #16a34a; }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .marker-critical { animation: pulse 1.5s infinite; }
    </style>
</head>
<body>

    <div id="map"></div>
    
    <!-- Botón Idioma -->
    <button id="lang-toggle" onclick="toggleLanguage()">EN</button>

    <div id="sidebar">
        <div class="sidebar-header">
            <h1 data-i18n="title">🇻🇪 SismoVe Ayuda</h1>
        </div>
        <div class="filters">
            <button class="filter-btn bg-critical active" data-filter="critical" data-i18n="filter_critical">Crítico</button>
            <button class="filter-btn bg-danger active" data-filter="danger" data-i18n="filter_danger">Peligro</button>
            <button class="filter-btn bg-help active" data-filter="help" data-i18n="filter_help">Ayuda</button>
            <button class="filter-btn bg-info active" data-filter="info" data-i18n="filter_info">Info</button>
            <button class="filter-btn bg-solved active" data-filter="solved" data-i18n="filter_solved">Solucionado</button>
        </div>
        <div class="reports-list" id="reports-list"></div>
    </div>

    <div id="legend">
        <div class="legend-item"><div class="legend-color" style="background: #ef4444;"></div><span data-i18n="legend_critical">Punto Crítico</span></div>
        <div class="legend-item"><div class="legend-color" style="background: #f97316;"></div><span data-i18n="legend_danger">Zona de Peligro</span></div>
        <div class="legend-item"><div class="legend-color" style="background: #22c55e;"></div><span data-i18n="legend_help">Zona de Ayuda/Recursos</span></div>
        <div class="legend-item"><div class="legend-color" style="background: #3b82f6;"></div><span data-i18n="legend_info">Punto Informativo</span></div>
        <div class="legend-item"><div class="legend-color" style="background: #9ca3af;">✓</div><span data-i18n="legend_solved">Solucionado</span></div>
    </div>

    <div id="context-menu">
        <div class="ctx-item" data-type="critical" data-i18n="ctx_critical">🚨 Reportar Emergencia Crítica</div>
        <div class="ctx-item" data-type="danger" data-i18n="ctx_danger">⚠️ Marcar Zona de Peligro</div>
        <div class="ctx-item" data-type="help" data-i18n="ctx_help">🏥 Solicitar/Ofrecer Ayuda</div>
        <div class="ctx-item" data-type="info" data-i18n="ctx_info">ℹ️ Reporte Informativo</div>
    </div>

    <div id="modal-overlay">
        <div id="modal">
            <h2 style="margin-bottom: 20px;" id="modal-title">Nuevo Reporte</h2>
            <form id="report-form">
                <input type="hidden" id="report-lat">
                <input type="hidden" id="report-lng">
                <input type="hidden" id="report-type">
                <div class="form-group">
                    <label data-i18n="lbl_title">Título del Reporte</label>
                    <input type="text" id="inp-title" data-i18n-ph="ph_title" placeholder="Ej: Edificio colapsado en la calle 10" required>
                </div>
                <div class="form-group">
                    <label data-i18n="lbl_desc">Descripción</label>
                    <textarea id="inp-desc" data-i18n-ph="ph_desc" rows="3" placeholder="Detalles adicionales..." required></textarea>
                </div>
                <div class="form-group">
                    <label data-i18n="lbl_level">Nivel de Peligro / Prioridad</label>
                    <div class="danger-level">
                        <button type="button" class="level-btn" style="background: #22c55e;" data-level="1" data-i18n="level_1">Bajo</button>
                        <button type="button" class="level-btn" style="background: #eab308;" data-level="2" data-i18n="level_2">Medio</button>
                        <button type="button" class="level-btn" style="background: #f97316;" data-level="3" data-i18n="level_3">Alto</button>
                        <button type="button" class="level-btn" style="background: #ef4444;" data-level="4" data-i18n="level_4">Crítico</button>
                    </div>
                    <input type="hidden" id="report-level" value="1">
                </div>
                <button type="submit" class="btn-submit" data-i18n="btn_submit">Enviar al Mapa</button>
                <button type="button" class="btn-submit" style="background: #64748b; margin-top: 10px;" onclick="closeModal()" data-i18n="btn_cancel">Cancelar</button>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // --- SISTEMA DE TRADUCCIÓN ---
        let currentLang = 'es';

        const translations = {
            es: {
                title: "🇻🇪 SismoVe Ayuda", lang_btn: "EN",
                filter_critical: "Crítico", filter_danger: "Peligro", filter_help: "Ayuda", filter_info: "Info", filter_solved: "Solucionado",
                legend_critical: "Punto Crítico", legend_danger: "Zona de Peligro", legend_help: "Zona de Ayuda/Recursos", legend_info: "Punto Informativo", legend_solved: "Solucionado",
                ctx_critical: "🚨 Reportar Emergencia Crítica", ctx_danger: "⚠️ Marcar Zona de Peligro", ctx_help: "🏥 Solicitar/Ofrecer Ayuda", ctx_info: "ℹ️ Reporte Informativo",
                modal_title_prefix: "Nuevo Reporte: ",
                lbl_title: "Título del Reporte", ph_title: "Ej: Edificio colapsado en la calle 10",
                lbl_desc: "Descripción", ph_desc: "Detalles adicionales...",
                lbl_level: "Nivel de Peligro / Prioridad",
                level_1: "Bajo", level_2: "Medio", level_3: "Alto", level_4: "Crítico",
                btn_submit: "Enviar al Mapa", btn_cancel: "Cancelar",
                popup_priority: "Prioridad", popup_type: "Tipo", popup_solved: "✅ Marcar como Solucionado",
                sidebar_solved: "✅ SOLUCIONADO",
                type_critical: "Emergencia Crítica", type_danger: "Zona de Peligro", type_help: "Ayuda/Recurso", type_info: "Informativo"
            },
            en: {
                title: "🇻🇪 SismoVe Help", lang_btn: "ES",
                filter_critical: "Critical", filter_danger: "Danger", filter_help: "Help", filter_info: "Info", filter_solved: "Solved",
                legend_critical: "Critical Point", legend_danger: "Danger Zone", legend_help: "Help/Resources Zone", legend_info: "Info Point", legend_solved: "Solved",
                ctx_critical: "🚨 Report Critical Emergency", ctx_danger: "⚠️ Mark Danger Zone", ctx_help: "🏥 Request/Offer Help", ctx_info: "ℹ️ Info Report",
                modal_title_prefix: "New Report: ",
                lbl_title: "Report Title", ph_title: "Ex: Building collapsed on 10th street",
                lbl_desc: "Description", ph_desc: "Additional details...",
                lbl_level: "Danger Level / Priority",
                level_1: "Low", level_2: "Medium", level_3: "High", level_4: "Critical",
                btn_submit: "Send to Map", btn_cancel: "Cancel",
                popup_priority: "Priority", popup_type: "Type", popup_solved: "✅ Mark as Solved",
                sidebar_solved: "✅ SOLVED",
                type_critical: "Critical Emergency", type_danger: "Danger Zone", type_help: "Help/Resource", type_info: "Informational"
            }
        };

        function toggleLanguage() {
            currentLang = currentLang === 'es' ? 'en' : 'es';
            document.getElementById('lang-toggle').innerText = translations[currentLang].lang_btn;
            
            // Cambiar textos estáticos
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[currentLang][key]) {
                    el.innerText = translations[currentLang][key];
                }
            });

            // Cambiar placeholders
            document.querySelectorAll('[data-i18n-ph]').forEach(el => {
                const key = el.getAttribute('data-i18n-ph');
                if (translations[currentLang][key]) {
                    el.placeholder = translations[currentLang][key];
                }
            });
        }

        // --- INICIALIZACIÓN DEL MAPA ---
        const map = L.map('map').setView([8.5, -66.5], 6);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
            subdomains: 'abcd', maxZoom: 19
        }).addTo(map);

        let markers = [];
        let currentLatLng = null;
        let currentType = null;
        let selectedLevel = 1;

        const colors = { critical: '#ef4444', danger: '#f97316', help: '#22c55e', info: '#3b82f6' };

        // --- EVENTOS MAPA ---
        map.on('contextmenu', function(e) {
            e.originalEvent.preventDefault();
            currentLatLng = e.latlng;
            const menu = document.getElementById('context-menu');
            menu.style.left = e.originalEvent.clientX + 'px';
            menu.style.top = e.originalEvent.clientY + 'px';
            menu.style.display = 'block';
        });

        document.addEventListener('click', () => { document.getElementById('context-menu').style.display = 'none'; });

        document.querySelectorAll('.ctx-item').forEach(item => {
            item.addEventListener('click', function() {
                currentType = this.getAttribute('data-type');
                document.getElementById('report-type').value = currentType;
                document.getElementById('report-lat').value = currentLatLng.lat;
                document.getElementById('report-lng').value = currentLatLng.lng;
                
                // Título dinámico según idioma
                const typeNameKey = `type_${currentType}`;
                document.getElementById('modal-title').innerText = translations[currentLang].modal_title_prefix + translations[currentLang][typeNameKey];
                
                document.getElementById('modal-overlay').style.display = 'flex';
                document.getElementById('context-menu').style.display = 'none';
            });
        });

        // --- FORMULARIO ---
        document.querySelectorAll('.level-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.level-btn').forEach(b => b.style.transform = 'scale(1)');
                this.style.transform = 'scale(1.1)';
                selectedLevel = this.getAttribute('data-level');
                document.getElementById('report-level').value = selectedLevel;
            });
        });

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('report-form').reset();
            document.querySelectorAll('.level-btn').forEach(b => b.style.transform = 'scale(1)');
        }

        document.getElementById('report-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const title = document.getElementById('inp-title').value;
            const desc = document.getElementById('inp-desc').value;
            const lat = document.getElementById('report-lat').value;
            const lng = document.getElementById('report-lng').value;
            const type = document.getElementById('report-type').value;
            const level = document.getElementById('report-level').value;

            addMarkerToMap(lat, lng, title, desc, type, level);
            closeModal();
        });

        // --- LÓGICA DE MARCADORES ---
        function createCustomIcon(type, level) {
            const size = (type === 'critical' || parseInt(level) >= 4) ? 20 : 14;
            const className = (type === 'critical') ? 'marker-critical' : '';
            return L.divIcon({
                className: className,
                html: `<div style="width:${size}px; height:${size}px; background-color:${colors[type]}; border:2px solid white; border-radius:50%; box-shadow:0 2px 5px rgba(0,0,0,0.5);"></div>`,
                iconSize: [size, size], iconAnchor: [size/2, size/2]
            });
        }

        function createSolvedIcon() {
            return L.divIcon({
                className: '',
                html: `<div style="width:18px; height:18px; background-color:#9ca3af; border:2px solid white; border-radius:50%; box-shadow:0 2px 5px rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; color:white; font-size:12px; font-weight:bold;">✓</div>`,
                iconSize: [18, 18], iconAnchor: [9, 9]
            });
        }

        function addMarkerToMap(lat, lng, title, desc, type, level) {
            const markerId = 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            const t = translations[currentLang]; // Alias para traducciones

            const popupContent = `
                <div style="text-align:center; color:#333; min-width: 220px;">
                    <h3 style="margin:0 0 10px; color:${colors[type]};">${title}</h3>
                    <p style="margin:0 0 10px; font-size:0.9rem;">${desc}</p>
                    <hr style="margin:10px 0; border-color:#ccc;">
                    <small>${t.popup_priority}: ${level}/4 | ${t.popup_type}: ${t['type_'+type]}</small>
                    <button class="btn-solved" onclick="markAsSolved('${markerId}')">${t.popup_solved}</button>
                </div>
            `;

            const marker = L.marker([lat, lng], { icon: createCustomIcon(type, level) })
                .addTo(map)
                .bindPopup(popupContent);
            
            markers.push({ marker, type, id: markerId, solved: false });
            addReportToSidebar(title, type, level, lat, lng, markerId);
        }

        function markAsSolved(markerId) {
            const markerData = markers.find(m => m.id === markerId);
            const t = translations[currentLang];
            
            if (markerData && !markerData.solved) {
                markerData.solved = true;
                markerData.marker.setIcon(createSolvedIcon());
                markerData.marker.closePopup();
                
                const sidebarItem = document.querySelector(`.report-item[data-id="${markerId}"]`);
                if (sidebarItem) {
                    sidebarItem.classList.add('solved-item');
                    sidebarItem.querySelector('.report-meta span:first-child').innerText = t.sidebar_solved;
                }
            }
        }

        function addReportToSidebar(title, type, level, lat, lng, markerId) {
            const list = document.getElementById('reports-list');
            const item = document.createElement('div');
            item.className = 'report-item';
            item.style.borderLeftColor = colors[type];
            item.setAttribute('data-id', markerId);
            
            const now = new Date();
            const time = `${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;
            const t = translations[currentLang];
            
            item.innerHTML = `
                <div class="report-title">${title}</div>
                <div class="report-meta">
                    <span>${t['type_'+type]} - ${t.popup_priority} ${level}</span>
                    <span>${time}</span>
                </div>
            `;
            
            item.addEventListener('click', () => {
                map.flyTo([lat, lng], 15, { duration: 1.5 });
                const markerData = markers.find(m => m.id === markerId);
                if(markerData) markerData.marker.openPopup();
            });

            list.prepend(item);
        }

        // --- FILTROS ---
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                this.classList.toggle('active');
                const filterType = this.getAttribute('data-filter');
                const isActive = this.classList.contains('active');

                markers.forEach(m => {
                    const isSolved = m.solved;
                    const isHidden = (filterType === 'solved') ? isSolved : (m.type === filterType);

                    if (isHidden) {
                        if (isActive) map.addLayer(m.marker);
                        else map.removeLayer(m.marker);
                    }
                });

                document.querySelectorAll('.report-item').forEach(item => {
                    const id = item.getAttribute('data-id');
                    const mData = markers.find(m => m.id === id);
                    if(mData) {
                        const isSolved = mData.solved;
                        const shouldHide = (filterType === 'solved' && isSolved) || (mData.type === filterType && !isSolved);
                        
                        if(shouldHide) {
                            item.style.display = isActive ? 'block' : 'none';
                        }
                    }
                });
            });
        });

        // Datos de prueba
        const mockData = [
            { lat: 10.491, lng: -66.879, title: "Edificio colapsado Los Caobos", desc: "Personas atrapadas.", type: "critical", level: 4 },
            { lat: 10.480, lng: -66.860, title: "Centro de acopio activo", desc: "Iglesia Santa Ana recogiendo agua.", type: "help", level: 1 },
            { lat: 10.505, lng: -66.900, title: "Zona de riesgo por grietas", desc: "Tierra con fallas, evitar paso.", type: "danger", level: 3 },
            { lat: 10.470, lng: -66.850, title: "Sin electricidad La Candelaria", desc: "Poste caído bloqueando calle.", type: "info", level: 2 }
        ];
        mockData.forEach(data => addMarkerToMap(data.lat, data.lng, data.title, data.desc, data.type, data.level));

    </script>
</body>
</html>
